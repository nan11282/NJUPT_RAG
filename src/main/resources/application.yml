server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true


spring:
  application:
    name: njupt-rag-assistant

  # 数据库配置
  datasource:
    url: jdbc:postgresql://localhost:5432/njupt_rag
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 2000ms

  # 👇👇👇 这里的配置必须跟 AiConfig.java 里的 @ConfigurationProperties 对应 👇👇👇
  ai:
    # 1. 自定义 DeepSeek 配置
    deepseek:
      base-url: https://api.deepseek.com
      api-key: your own key
      chat-model: deepseek-chat

    # 2. 自定义 SiliconFlow 配置
    siliconflow:
      base-url: https://api.siliconflow.cn
      api-key: your own key
      embedding-model: BAAI/bge-m3

    # 3. 向量库配置 (通用)
    vectorstore:
      pgvector:
        dimensions: 1024
        initialize-schema: false
        index-type: HNSW

# 👇👇👇 文档配置 👇👇👇
# 用于配置可用的文档列表，支持用户选择自己的学院培养方案
njupter:
  documents:
    # 培养方案
    - filename: "2023级计算机学院培养方案.pdf"
      name: "计算机学院"
      category: "培养方案"
    - filename: "2023级通信学院培养方案.pdf"
      name: "通信与信息工程学院"
      category: "培养方案"
    - filename: "2023级电子学院培养方案.pdf"
      name: "电子与光学工程学院"
      category: "培养方案"
    # 政策文档
    - filename: "保研政策.pdf"
      name: "保研政策"
      category: "政策"
    - filename: "选课指南.pdf"
      name: "选课指南"
      category: "指南"

logging:
  level:
    org.springframework.web.client.RestClient: DEBUG # 👈 开启 REST 客户端日志
    org.springframework.ai.openai.api: DEBUG         # 👈 开启 OpenAI API 内部日志
