server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true


spring:
  application:
    name: njupt-rag-assistant

  # 数据库配置
  datasource:
    url: jdbc:postgresql://localhost:5432/njupt_rag
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 2000ms

  # 👇👇👇 这里的配置必须跟 AiConfig.java 里的 @ConfigurationProperties 对应 👇👇👇
  ai:
    # 1. 自定义 DeepSeek 配置
    deepseek:
      base-url: https://api.deepseek.com
      api-key: your own key
      chat-model: deepseek-chat

    # 2. 自定义 SiliconFlow 配置
    siliconflow:
      base-url: https://api.siliconflow.cn
      api-key: your own key
      embedding-model: BAAI/bge-m3

    # 3. 向量库配置 (通用)
    vectorstore:
      pgvector:
        dimensions: 1024
        initialize-schema: true
        remove-existing-vector-store-table: false
        index-type: HNSW
        distance-type: COSINE_DISTANCE

# 👇👇👇 文档配置 👇👇👇
njupter:
  # 文档存储目录配置，支持多个路径（逗号分隔）
  # 支持相对路径（相对于项目根目录）和绝对路径
  # 特殊值 'classpath'：从 classpath 扫描（打包后的 JAR 内）
  # 特殊值 'classpath*'：从所有 classpath 扫描（包括依赖包）
  # 示例：
  #   - classpath*:data/*.pdf          # 从 classpath 扫描（默认）
  #   - file:./data/*.pdf             # 从项目根目录的 data 文件夹扫描
  #   - file:/var/njupter/data/*.pdf   # 从绝对路径扫描
  #   - classpath*:data/*.pdf,file:./data/*.pdf  # 同时扫描多个位置
  document-paths: "classpath*:data/*.pdf,file:./data/*.pdf"

  # 可用的文档列表，支持用户选择自己的学院培养方案
  documents:
    # 培养方案
    - filename: "2023级计算机学院培养方案.pdf"
      name: "计算机学院"
      category: "培养方案"
    - filename: "2023级通信学院培养方案.pdf"
      name: "通信与信息工程学院"
      category: "培养方案"
    - filename: "2023级电子学院培养方案.pdf"
      name: "电子与光学工程学院"
      category: "培养方案"
    # 政策文档
    - filename: "保研政策.pdf"
      name: "保研政策"
      category: "政策"
    - filename: "选课指南.pdf"
      name: "选课指南"
      category: "指南"

# 👇👇👇 日志配置 👇👇👇
# 使用 logback-spring.xml 配置，这里只配置邮件服务器
njupter:
  logging:
    # 日志文件存放路径
    path: "logs"
    # 日志文件名（不含扩展名）
    file-name: "njupter"
    # 单个日志文件最大大小
    max-file-size: "100MB"
    # 保留的历史日志文件数量
    max-history: "30"
    # 邮件通知配置
    mail:
      # 是否启用邮件通知
      enabled: "true"
      # 接收告警邮件的地址（多个用逗号分隔）
      to: "your-email@example.com"
      # 发件人地址
      from: "noreply@njupter.com"
      # 邮件主题
      subject: "【NJUPTer 系统告警】发生 ERROR 级别错误"

# 👇👇👇 邮件服务器配置 👇👇👇
# 当 njupter.logging.mail.enabled=true 时生效
spring:
  mail:
    host: "smtp.example.com"
    port: 587
    username: "your-email@example.com"
    password: "your-email-password"
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: "true"
          starttls:
            enable: "true"
            required: "false"

